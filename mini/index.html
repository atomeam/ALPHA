<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HomeBase</title>
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0a0a0a" />
<style>
  :root { color-scheme: dark;
    --ok: #22c55e; --pending: #eab308; --error: #ef4444; --idle: #52525b;
    --accent: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #050505; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; overflow: hidden; user-select: none;
  }
  .bg { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
  .bg .blob1 { position: absolute; top: -10%; left: -10%; width: 500px; height: 500px;
    background: rgba(30,58,138,0.10); border-radius: 50%; filter: blur(120px); }
  .bg .blob2 { position: absolute; bottom: -10%; right: -10%; width: 500px; height: 500px;
    background: rgba(39,39,42,0.10); border-radius: 50%; filter: blur(120px); }
  .bg .grid { position: absolute; inset: 0; opacity: 0.03;
    background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 32px 32px; }
  main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; z-index: 10; padding: 0 2rem; }
  .header { margin-bottom: 2rem; text-align: center; }
  .header p { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6em; color: #71717a;
    font-weight: 500; margin-bottom: 0.75rem; }
  .header .line { height: 1px; width: 192px; margin: 0 auto;
    background: linear-gradient(to right, transparent, #3f3f46, transparent); }
  .intent-wrap { margin-bottom: 1.5rem; width: 22rem; max-width: 90vw; user-select: text; }
  .intent-wrap input {
    appearance: none; width: 100%;
    background: transparent; color: #d4d4d8;
    border: none; border-bottom: 1px solid #27272a;
    padding: 0.5rem 0.25rem; text-align: center;
    font-family: Georgia, serif; font-style: italic; font-size: 13px;
    letter-spacing: 0.05em; outline: none;
    transition: border-color 0.2s, color 0.2s;
  }
  .intent-wrap input::placeholder { color: #3f3f46; }
  .intent-wrap input:focus { border-bottom-color: #71717a; color: #f4f4f5; }
  .intent-wrap .hint { display: block; margin-top: 0.4rem; text-align: center;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: #3f3f46; }
  .btn-wrap { position: relative; }
  .btn-glow { position: absolute; inset: 0; background: rgba(255,255,255,0.05);
    border-radius: 1rem; filter: blur(16px); transition: background 0.5s; }
  .btn-wrap:hover .btn-glow { background: rgba(255,255,255,0.10); }
  button.homebase { position: relative; width: 16rem; height: 6rem;
    background: #18181b; border: 1px solid #3f3f46; border-radius: 0.75rem;
    color: #f4f4f5; font-size: 1.5rem; font-weight: 700;
    letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    transition: transform 0.15s, color 0.2s; overflow: hidden; }
  button.homebase:hover { color: #fff; transform: scale(1.02); }
  button.homebase:active { transform: scale(0.95); }
  button.homebase .bevel { position: absolute; inset: 1px;
    border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; pointer-events: none; }
  button.homebase .pip { position: absolute; width: 4px; height: 4px; background: #3f3f46; }
  button.homebase .pip.tl { top: 8px; left: 8px; }
  button.homebase .pip.tr { top: 8px; right: 8px; }
  button.homebase .pip.bl { bottom: 8px; left: 8px; }
  button.homebase .pip.br { bottom: 8px; right: 8px; }
  button.homebase.idle { animation: idlePulse 2s ease-in-out infinite; }
  @keyframes idlePulse { 0%,100%{opacity:1;} 50%{opacity:0.85;} }
  .descriptor { margin-top: 2rem; text-align: center; font-style: italic;
    font-family: Georgia, serif; font-size: 11px; color: #52525b; letter-spacing: 0.15em; }
  .propose-link { margin-top: 1.25rem; background: transparent; border: none; cursor: pointer;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px;
    letter-spacing: 0.25em; text-transform: uppercase; color: #52525b;
    padding: 4px 10px; border-radius: 4px; transition: color 0.2s, background 0.2s; }
  .propose-link:hover { color: var(--accent); background: rgba(96,165,250,0.08); }
  .propose-link:disabled { opacity: 0.4; cursor: not-allowed; }

  .banner { position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    padding: 14px 24px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px; line-height: 1.4; letter-spacing: 0.05em;
    transform: translateY(-110%); transition: transform 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); cursor: pointer; }
  .banner.show { transform: translateY(0); }
  .banner.error   { background: #7f1d1d; color: #fecaca; border-bottom: 2px solid #ef4444; }
  .banner.warn    { background: #78350f; color: #fed7aa; border-bottom: 2px solid #f59e0b; }
  .banner.success { background: #14532d; color: #bbf7d0; border-bottom: 2px solid #22c55e; }
  .banner b { font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-right: 8px; }
  .banner .dismiss { float: right; opacity: 0.6; font-weight: 700; }
  .banner a { color: inherit; text-decoration: underline; }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 1rem;
    overflow-y: auto; }
  .modal-bg[hidden] { display: none; }
  .modal { background: #0a0a0a; border: 1px solid #27272a; border-radius: 0.75rem;
    padding: 1.75rem; max-width: 32rem; width: 100%;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); user-select: text;
    max-height: 95vh; overflow-y: auto; }
  .modal h2 { font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase; color: #71717a;
    font-weight: 600; margin-bottom: 1.25rem; font-family: ui-monospace, monospace; }
  .modal label { display: block; margin-bottom: 1.1rem; }
  .modal .label-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.4rem; }
  .modal .label-row span { font-size: 11px; color: #a1a1aa; letter-spacing: 0.1em; text-transform: uppercase; font-family: ui-monospace, monospace; }
  .modal .label-row a { font-size: 10px; color: var(--accent); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; font-family: ui-monospace, monospace; }
  .modal .label-row a:hover { text-decoration: underline; }
  .modal input { width: 100%; background: #050505; color: #f4f4f5; border: 1px solid #27272a;
    border-radius: 0.375rem; padding: 0.5rem 0.75rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;
    outline: none; transition: border-color 0.2s; }
  .modal input:focus { border-color: var(--accent); }
  .modal .hint { display: block; margin-top: 0.35rem; font-size: 10px; color: #52525b;
    letter-spacing: 0.05em; font-family: ui-monospace, monospace; }
  .modal .hint.ok { color: var(--ok); }
  .modal .hint.bad { color: var(--error); }
  .modal .section-note { font-size: 10px; color: #71717a; font-family: ui-monospace, monospace;
    letter-spacing: 0.05em; margin: 0.5rem 0 0.75rem; padding-left: 0.5rem; border-left: 2px solid #27272a; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.5rem; }
  .modal-actions button {
    background: transparent; border: 1px solid #27272a; color: #a1a1aa;
    border-radius: 999px; padding: 0.4rem 1rem;
    font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; cursor: pointer; transition: all 0.15s;
  }
  .modal-actions button:hover { color: #f4f4f5; border-color: #3f3f46; }
  .modal-actions button.primary { color: var(--accent); border-color: var(--accent); }
  .modal-actions button.primary:hover { background: rgba(96,165,250,0.12); }
  .modal-actions button.danger { color: #a1a1aa; }
  .modal-actions button.danger:hover { color: var(--error); border-color: var(--error); }
  .modal-actions button:disabled { opacity: 0.4; cursor: not-allowed; }

  .prop-summary { font-family: Georgia, serif; font-size: 18px; line-height: 1.4; color: #f4f4f5;
    margin: 0.5rem 0 1rem; padding: 1rem; background: #050505; border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0; }
  .prop-meta { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: #52525b; margin-bottom: 1rem; }
  .prop-meta b { color: #a1a1aa; }
  .prop-patches { background: #050505; border: 1px solid #18181b; border-radius: 6px;
    padding: 0.75rem; max-height: 18rem; overflow-y: auto;
    font-family: ui-monospace, monospace; font-size: 10px; color: #71717a; }
  .prop-patches .patch { padding: 0.5rem 0; border-bottom: 1px dashed #18181b; }
  .prop-patches .patch:last-child { border-bottom: 0; }
  .prop-patches .line { white-space: pre-wrap; word-break: break-all; }
  .prop-patches .line.del { color: #fca5a5; }
  .prop-patches .line.add { color: #86efac; }

  footer { height: 3rem; background: #0a0a0a; border-top: 1px solid #27272a;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2.5rem; position: relative; z-index: 20; }
  .left { display: flex; align-items: center; gap: 0.75rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--idle);
    box-shadow: 0 0 8px rgba(82,82,91,0.4); transition: background 0.3s, box-shadow 0.3s; cursor: help; }
  .dot.ok      { background: var(--ok);      box-shadow: 0 0 10px rgba(34,197,94,0.6);  animation: pulse 2s infinite; }
  .dot.pending { background: var(--pending); box-shadow: 0 0 10px rgba(234,179,8,0.6);  animation: pulse 0.8s infinite; }
  .dot.error   { background: var(--error);   box-shadow: 0 0 10px rgba(239,68,68,0.7); }
  @keyframes pulse { 50% { opacity: 0.5; } }
  .label-text { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; font-weight: 600; color: #a1a1aa; letter-spacing: 0.1em;
    text-transform: uppercase; white-space: nowrap; }
  .label-text .dim { color: #71717a; font-weight: 400; }
  .right { display: flex; align-items: center; gap: 1rem; }
  .divider { height: 1rem; width: 1px; background: #27272a; }
  #counter { font-weight: 700; display: inline-block; min-width: 2ch;
    transition: transform 0.25s, color 0.25s; }
  #counter.bump { transform: scale(1.5); color: #86efac; }
  #clicksLabel { cursor: pointer; }
  .gear { background: transparent; border: none; color: #52525b; font-size: 14px;
    cursor: pointer; padding: 4px 6px; line-height: 1; transition: color 0.2s; }
  .gear:hover { color: #a1a1aa; }
  .build-stamp { position: fixed; bottom: 4rem; right: 0.75rem; font-family: ui-monospace, monospace;
    font-size: 9px; color: #27272a; letter-spacing: 0.1em; pointer-events: none; z-index: 5; }
</style>
</head>
<body>
  <div class="banner" id="banner"><span class="dismiss">×</span><b id="bannerKind">info</b><span id="bannerText"></span></div>
  <div class="bg"><div class="blob1"></div><div class="blob2"></div><div class="grid"></div></div>
  <main>
    <div class="header">
      <p>Primary Command Interface</p>
      <div class="line"></div>
    </div>
    <div class="intent-wrap">
      <input id="intent" type="text" maxlength="240" autocomplete="off" spellcheck="true"
             placeholder="why are you summoning me?" aria-label="intent" />
      <span class="hint">optional · enter or click to send</span>
    </div>
    <div class="btn-wrap">
      <div class="btn-glow"></div>
      <button class="homebase" id="homebase-button" aria-label="Homebase">
        <span class="bevel"></span>
        Homebase
        <span class="pip tl"></span><span class="pip tr"></span>
        <span class="pip bl"></span><span class="pip br"></span>
      </button>
    </div>
    <div class="descriptor">Bridge Connection: Active</div>
    <div class="quick-note-wrap">
      <input id="quickNote" type="text" maxlength="120" autocomplete="off" spellcheck="true" placeholder="quick note (enter to save)" aria-label="quick note" />
    </div>
    <button class="propose-link" id="proposeBtn" type="button" title="Have the LLM propose a new capability based on intent log + recent commits">✨ propose change</button>
  </main>
  <footer>
    <div class="left">
      <div class="dot" id="dot" title="No token. Click gear to set up."></div>
      <span class="label-text">Homebase <span class="dim" id="statusMsg">offline</span></span>
    </div>
    <div class="right">
      <button class="gear" id="gear" title="Settings" type="button">⚙</button>
      <div class="divider"></div>
      <span class="label-text" id="clicksLabel" title="Double-click to reset local count">clicks: <span id="counter">0</span></span>
    </div>
  </footer>
  <div class="build-stamp">build quad-llm-v9</div>

  <div class="modal-bg" id="modalBg" hidden>
    <div class="modal">
      <h2>Settings</h2>
      <label>
        <div class="label-row">
          <span>GitHub Personal Access Token</span>
          <a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener">create token</a>
        </div>
        <input type="password" id="gh-input" placeholder="github_pat_..." autocomplete="off" />
        <span class="hint" id="gh-hint">Fine-grained PAT · atomeam/HomeBase- · Contents + Pull requests: Read &amp; write</span>
      </label>
      <div class="section-note">For ✨ propose change. Add any one or more. Tried in this order: Mistral → Gemini → OpenRouter → Groq.</div>
      <label>
        <div class="label-row">
          <span>Mistral API Key (free)</span>
          <a href="https://console.mistral.ai/api-keys" target="_blank" rel="noopener">create key</a>
        </div>
        <input type="password" id="mst-input" placeholder="mistral key" autocomplete="off" />
        <span class="hint" id="mst-hint">console.mistral.ai · phone verify, no card · 131K context · 1B tokens/month</span>
      </label>
      <label>
        <div class="label-row">
          <span>Gemini API Key (free)</span>
          <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">create key</a>
        </div>
        <input type="password" id="gem-input" placeholder="AIza..." autocomplete="off" />
        <span class="hint" id="gem-hint">Google AI Studio · no credit card · 1M context · 1500 req/day</span>
      </label>
      <label>
        <div class="label-row">
          <span>OpenRouter API Key (free)</span>
          <a href="https://openrouter.ai/keys" target="_blank" rel="noopener">create key</a>
        </div>
        <input type="password" id="or-input" placeholder="sk-or-v1-..." autocomplete="off" />
        <span class="hint" id="or-hint">openrouter.ai · no card · 50 req/day cap on free models</span>
      </label>
      <label>
        <div class="label-row">
          <span>Groq API Key (free)</span>
          <a href="https://console.groq.com/keys" target="_blank" rel="noopener">create key</a>
        </div>
        <input type="password" id="groq-input" placeholder="gsk_..." autocomplete="off" />
        <span class="hint" id="groq-hint">console.groq.com · no card · Llama 3.1 8B (low TPM, last resort)</span>
      </label>
      <div class="modal-actions">
        <button id="modal-clear" type="button" class="danger">Clear all</button>
        <button id="modal-close" type="button">Close</button>
        <button id="modal-save" type="button" class="primary">Save &amp; test</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="propModalBg" hidden>
    <div class="modal">
      <h2>Proposed Change</h2>
      <div class="prop-meta" id="propMeta"></div>
      <div class="prop-summary" id="propSummary"></div>
      <div class="prop-patches" id="propPatches"></div>
      <div class="modal-actions">
        <button id="prop-skip" type="button" class="danger">Skip</button>
        <button id="prop-apply" type="button" class="primary">Apply &amp; reload</button>
      </div>
    </div>
  </div>

  <script>
    var REPO_OWNER = 'atomeam';
    var REPO_NAME  = 'HomeBase-';
    var LOG_PATH   = 'mini/log.jsonl';
    var INDEX_PATH = 'mini/index.html';
    var BRANCH     = 'main';

    var MISTRAL_MODEL = 'mistral-large-latest';
    var GROQ_MODEL = 'llama-3.1-8b-instant';
    var GEMINI_MODEL = 'gemini-2.0-flash';
    var OPENROUTER_MODEL = 'google/gemini-2.0-flash-exp:free';
    var OPENROUTER_FALLBACKS = [
      'meta-llama/llama-3.3-70b-instruct:free',
      'deepseek/deepseek-chat-v3.1:free',
      'mistralai/mistral-small-3.2-24b-instruct:free'
    ];

    var KEY_CLICKS     = 'homebase:clicks';
    var KEY_TOKEN      = 'homebase:gh:token';
    var KEY_MISTRAL    = 'homebase:mistral:key';
    var KEY_GEMINI     = 'homebase:gemini:key';
    var KEY_OPENROUTER = 'homebase:openrouter:key';
    var KEY_GROQ       = 'homebase:groq:key';
    var KEY_PENDING    = 'homebase:pending';

    var oldLlm = localStorage.getItem('homebase:llm:key');
    if (oldLlm && !localStorage.getItem(KEY_GROQ)) {
      localStorage.setItem(KEY_GROQ, oldLlm);
      localStorage.removeItem('homebase:llm:key');
    }
    if (localStorage.getItem('homebase:openai:key')) {
      localStorage.removeItem('homebase:openai:key');
    }

    var btn         = document.getElementById('homebase-button');
    var counter     = document.getElementById('counter');
    var clicksLabel = document.getElementById('clicksLabel');
    var dot         = document.getElementById('dot');
    var statusMsg   = document.getElementById('statusMsg');
    var gear        = document.getElementById('gear');
    var banner      = document.getElementById('banner');
    var bannerKind  = document.getElementById('bannerKind');
    var bannerText  = document.getElementById('bannerText');
    var intent      = document.getElementById('intent');
    var proposeBtn  = document.getElementById('proposeBtn');
    var modalBg     = document.getElementById('modalBg');
    var ghInput     = document.getElementById('gh-input');
    var ghHint      = document.getElementById('gh-hint');
    var mstInput    = document.getElementById('mst-input');
    var mstHint     = document.getElementById('mst-hint');
    var gemInput    = document.getElementById('gem-input');
    var gemHint     = document.getElementById('gem-hint');
    var orInput     = document.getElementById('or-input');
    var orHint      = document.getElementById('or-hint');
    var groqInput   = document.getElementById('groq-input');
    var groqHint    = document.getElementById('groq-hint');
    var propModalBg = document.getElementById('propModalBg');
    var propMeta    = document.getElementById('propMeta');
    var propSummary = document.getElementById('propSummary');
    var propPatches = document.getElementById('propPatches');
    var propApplyBtn= document.getElementById('prop-apply');
    var propSkipBtn = document.getElementById('prop-skip');

    var token         = localStorage.getItem(KEY_TOKEN) || null;
    var mistralKey    = localStorage.getItem(KEY_MISTRAL) || null;
    var geminiKey     = localStorage.getItem(KEY_GEMINI) || null;
    var openrouterKey = localStorage.getItem(KEY_OPENROUTER) || null;
    var groqKey       = localStorage.getItem(KEY_GROQ) || null;
    var clicks = Number(localStorage.getItem(KEY_CLICKS) || 0);
    if (!isFinite(clicks)) clicks = 0;
    counter.textContent = clicks;
    var clickSound = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU...'); // Truncated base64 for brevity (actual would be full 16-bit PCM click)

    var queue = [];
    try { queue = JSON.parse(localStorage.getItem(KEY_PENDING) || '[]'); } catch (e) { queue = []; }
    if (!Array.isArray(queue)) queue = [];
    var draining = false;
    var cache = null;
    var bannerTimer = null;
    var pendingProposal = null;

    function saveQueue() { localStorage.setItem(KEY_PENDING, JSON.stringify(queue)); }

    function showBanner(kind, html, autoHideMs) {
      banner.className = 'banner show ' + kind;
      bannerKind.textContent = kind;
      bannerText.innerHTML = html;
      if (bannerTimer) clearTimeout(bannerTimer);
      if (autoHideMs) bannerTimer = setTimeout(hideBanner, autoHideMs);
    }
    function hideBanner() {
      banner.className = 'banner';
      if (bannerTimer) { clearTimeout(bannerTimer); bannerTimer = null; }
    }
    banner.addEventListener('click', function(e){ if (e.target.tagName !== 'A') hideBanner(); });
    function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function setStatus(kind, msg) {
      dot.classList.remove('ok','pending','error');
      if (kind && kind !== 'idle') dot.classList.add(kind);
      var labels = {
        idle: token ? 'ready' : 'no token',
        ok: 'logged',
        pending: 'writing… q:' + queue.length,
        error: 'error'
      };
      statusMsg.textContent = labels[kind] || labels.idle;
      dot.title = kind === 'error' ? (msg || 'Error') :
                  kind === 'pending' ? (queue.length + ' pending') :
                  kind === 'ok' ? 'Last write OK' :
                  token ? 'Token set. Ready.' : 'No token. Click gear to set up.';
    }

    function b64encode(s) { return btoa(unescape(encodeURIComponent(s))); }
    function b64decode(s) {
      try { return decodeURIComponent(escape(atob(s.replace(/\s/g,'')))); } catch (e) { return ''; }
    }

    async function ghGetFile(path) {
      path = path || LOG_PATH;
      var url = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                '/contents/' + path + '?ref=' + BRANCH + '&t=' + Date.now();
      var r = await fetch(url, {
        headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github+json' },
        cache: 'no-store'
      });
      if (r.status === 404) return { sha: null, content: '' };
      if (!r.ok) {
        var txt = ''; try { txt = (await r.json()).message || ''; } catch(e){}
        var err = new Error('GET ' + r.status + (txt ? ': ' + txt : ''));
        err.status = r.status; throw err;
      }
      var j = await r.json();

    async function ghGetCommits(limit) {
      limit = limit || 25;
      var url = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                '/commits?sha=' + BRANCH + '&per_page=' + limit + '&t=' + Date.now();
      var r = await fetch(url, {
        headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github+json' },
        cache: 'no-store'
      });
      if (!r.ok) return [];
      var j = await r.json();
      return j.map(function(c){
        var msg = (c.commit && c.commit.message) || '';
        return msg.split('\n')[0];
      });

    async function ghPutFile(content, sha, commitMessage, branchName) {
      var url = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + LOG_PATH;
      var body = {
        message: commitMessage || ('log: ' + new Date().toISOString()),
        content: b64encode(content),
        branch: branchName || BRANCH
      };
      if (sha) body.sha = sha;
      var r = await fetch(url, {
        method: 'PUT',
        headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!r.ok) {
        var txt = ''; try { txt = (await r.json()).message || ''; } catch(e){}
        var err = new Error('PUT ' + r.status + (txt ? ': ' + txt : ''));
        err.status = r.status; throw err;
      }
      var j = await r.json();
      return j.content && j.content.sha;
    }

    function shortenForCommit(note) {
      var s = note.replace(/\s+/g, ' ').trim();

    async function writeOne(entry) {
      if (!cache) cache = await ghGetFile(LOG_PATH);
      var line = JSON.stringify(entry);
      var sep = (cache.content && !cache.content.endsWith('\n')) ? '\n' : '';
      var newContent = cache.content + sep + line + '\n';
      var msg = entry.note ? 'log: ' + shortenForCommit(entry.note) : 'log: ' + entry.ts;
      try {
        var newSha = await ghPutFile(newContent, cache.sha, msg);
        cache = { sha: newSha, content: newContent };
      } catch (e) {
        if (e.status === 409 || e.status === 422) {
          cache = await ghGetFile(LOG_PATH);
          var sep2 = (cache.content && !cache.content.endsWith('\n')) ? '\n' : '';
          var newContent2 = cache.content + sep2 + line + '\n';
          var newSha2 = await ghPutFile(newContent2, cache.sha, msg);
          cache = { sha: newSha2, content: newContent2 };
        } else { throw e; }
      }
    }

    async function drain() {

      if (!token) { setStatus('idle'); return; }
      if (!queue.length) { setStatus('ok'); return; }
      draining = true;

      while (queue.length) {
        var entry = queue[0];
        try {
          await writeOne(entry);
          queue.shift(); saveQueue(); setStatus('pending');
        } catch (e) {
          console.error('[homebase] write failed:', e);
          setStatus('error', e.message);
          showBanner('error', 'WRITE FAILED — ' + escapeHtml(e.message));
          draining = false; setTimeout(drain, 5000); return;
        }
      }
      setStatus('ok'); draining = false;
    }

    var STYLE_PLACEHOLDER = '<style>/* CSS_HIDDEN_FROM_PROMPT_DO_NOT_PATCH */</style>';
    function splitStyle(html) {
      var m = html.match(/<style>[\s\S]*?<\/style>/);
      if (!m) return { working: html, originalStyle: null };
      var working = html.slice(0, m.index) + STYLE_PLACEHOLDER + html.slice(m.index + m[0].length);
      return { working: working, originalStyle: m[0] };
    }
    function restoreStyle(patched, split) {
      if (!split.originalStyle) return patched;
      var i = patched.indexOf(STYLE_PLACEHOLDER);
      if (i === -1) throw new Error('Style placeholder lost during patching');
      return patched.slice(0, i) + split.originalStyle + patched.slice(i + STYLE_PLACEHOLDER.length);
    }

    function applyPatches(html, patches) {
      if (!Array.isArray(patches) || !patches.length) throw new Error('No patches returned');
      var out = html;
      for (var i = 0; i < patches.length; i++) {
        var p = patches[i];
        if (!p || typeof p.find !== 'string' || typeof p.replace !== 'string') throw new Error('Patch ' + (i+1) + ' missing find/replace');
        if (!p.find.length) throw new Error('Patch ' + (i+1) + ' has empty find');
        if (p.find.indexOf('CSS_HIDDEN_FROM_PROMPT_DO_NOT_PATCH') !== -1) throw new Error('Patch ' + (i+1) + ' tries to edit hidden CSS placeholder');
        var idx = out.indexOf(p.find);
        if (idx === -1) throw new Error('Patch ' + (i+1) + ' find not in source: ' + p.find.slice(0, 60));
        var idx2 = out.indexOf(p.find, idx + 1);
        if (idx2 !== -1) throw new Error('Patch ' + (i+1) + ' find is ambiguous');
        out = out.slice(0, idx) + p.replace + out.slice(idx + p.find.length);
      }
      return out;
    }

    async function callMistral(prompt) {
      var r = await fetch('https://api.mistral.ai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + mistralKey, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: MISTRAL_MODEL,
          messages: [
            { role: 'system', content: 'You output strict JSON only. No markdown fences. No prose outside the JSON object.' },
            { role: 'user', content: prompt }
          ],
          response_format: { type: 'json_object' },
          temperature: 0.5,
          max_tokens: 4096
        })
      });
      if (!r.ok) {
        var msg = ''; try { var je = await r.json(); msg = (je.message) || (je.error && je.error.message) || ''; } catch(e){}
        var err = new Error('Mistral ' + r.status + ': ' + msg); err.status = r.status; throw err;
      }
      var j = await r.json();
      var text = j.choices && j.choices[0] && j.choices[0].message && j.choices[0].message.content;
      if (!text) throw new Error('Empty Mistral response');
      try { return JSON.parse(text); }
      catch (e) { throw new Error('Mistral returned invalid JSON: ' + text.slice(0, 200)); }
    }

    async function callLlm(prompt) {
      var errors = [];
      var providers = [
        { name: 'Mistral',    key: mistralKey,    fn: callMistral },
        { name: 'Gemini',     key: geminiKey,     fn: callGemini },
        { name: 'OpenRouter', key: openrouterKey, fn: callOpenrouter },
        { name: 'Groq',       key: groqKey,       fn: callGroq }
      ];
      for (var i = 0; i < providers.length; i++) {
        var p = providers[i];
        if (!p.key) continue;
        try {
          var proposal = await p.fn(prompt);
          var providerLabel = p.name;
          if (p.name === 'OpenRouter' && proposal.__model) {
            providerLabel = 'OpenRouter:' + proposal.__model.split('/').pop().replace(':free','');
            delete proposal.__model;
          }
          return { proposal: proposal, provider: providerLabel };
        }
        catch (e) {
          console.warn('[homebase] ' + p.name + ' failed:', e.message);
          errors.push(p.name + ': ' + e.message);
        }
      }
      if (!errors.length) throw new Error('No LLM key. Add Mistral, Gemini, OpenRouter, or Groq in ⚙.');
      throw new Error('All providers failed — ' + errors.join(' / '));
    }

        setTimeout(function(){
          var sep = location.search ? '&' : '?';
          var bust = 'v=' + (newSha || Date.now());
          var clean = location.search.replace(/[?&]v=[^&]*/g, '');
          location.search = clean + (clean ? '&' : '?') + bust;
        }, 700);
      } catch (e) {
        console.error('[homebase] apply failed:', e);
        showBanner('error', 'APPLY FAILED — ' + escapeHtml(e.message));
        propApplyBtn.disabled = false; propSkipBtn.disabled = false;
        propApplyBtn.textContent = 'Retry apply';
      }
    });

    async function proposeChange() {
      if (!token) { showBanner('warn', 'Set GitHub token first (⚙).', 4000); return; }
      if (!mistralKey && !geminiKey && !openrouterKey && !groqKey) { showBanner('warn', 'Need a Mistral, Gemini, OpenRouter, or Groq key (⚙).', 5000); return; }
      proposeBtn.disabled = true;
      try {
        showBanner('warn', 'Reading log + commits + current code…');
        var logFile = await ghGetFile(LOG_PATH);
        var lines = logFile.content.trim().split('\n').filter(Boolean);
        var notes = [];
        for (var i = Math.max(0, lines.length - 50); i < lines.length; i++) {
          try { var e = JSON.parse(lines[i]); if (e && e.note) notes.push(e.note); } catch (er) {}
        }
        var commits = await ghGetCommits(25);
        var indexFile = await ghGetFile(INDEX_PATH);
        if (!indexFile.content) throw new Error('Could not load mini/index.html');

        var split = splitStyle(indexFile.content);
        var available = [mistralKey && 'Mistral', geminiKey && 'Gemini', openrouterKey && 'OpenRouter', groqKey && 'Groq'].filter(Boolean).join('→');
        showBanner('warn', 'Asking ' + available + ' (~' + Math.round(split.working.length/1024) + 'KB code, ' + notes.length + ' notes, ' + commits.length + ' commits)…');
        var prompt = buildPrompt(notes, commits, split.working);
        var result = await callLlm(prompt);
        var proposal = result.proposal;
        if (!proposal.summary || !Array.isArray(proposal.patches)) throw new Error('Proposal missing summary or patches');

        var patchedSlim = applyPatches(split.working, proposal.patches);
        if (patchedSlim === split.working) throw new Error('Patches resulted in no change');
        var newHtml = restoreStyle(patchedSlim, split);
        if (newHtml.length < 1000) throw new Error('Result suspiciously short');

        hideBanner();
        renderProposal(result.provider, proposal, newHtml, indexFile.sha);
      } catch (e) {
        console.error('[homebase] propose failed:', e);
        showBanner('error', 'PROPOSE FAILED — ' + escapeHtml(e.message));
      } finally {
        proposeBtn.disabled = false;
      }
    }
    proposeBtn.addEventListener('click', proposeChange);

    setStatus(token ? (queue.length ? 'pending' : 'ok') : 'idle');
    armIdle();
    if (token && queue.length) drain();
    if (!token) showBanner('warn', 'No GitHub token. Click ⚙ to set up.', 6000);
  </script>
</body>
</html>
