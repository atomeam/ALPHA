<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)" stroke="url(#glow)" stroke-width="4"/>
  <!-- Inner glow ring -->
  <circle cx="256" cy="240" r="160" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.4"/>
  <!-- Alpha symbol (stylized A) -->
  <path d="M256 80 L160 380 L195 380 L220 310 L292 310 L317 380 L352 380 Z M256 150 L280 280 L232 280 Z"
        fill="url(#accent)" opacity="0.95"/>
  <!-- Orbital arc top -->
  <ellipse cx="256" cy="240" rx="180" ry="60" fill="none" stroke="#e94560" stroke-width="3" opacity="0.6"
           transform="rotate(-30 256 240)" stroke-dasharray="8 4"/>
  <!-- Orbital arc bottom -->
  <ellipse cx="256" cy="240" rx="180" ry="60" fill="none" stroke="#533483" stroke-width="3" opacity="0.6"
           transform="rotate(30 256 240)" stroke-dasharray="8 4"/>
  <!-- Small orbital dots -->
  <circle cx="130" cy="160" r="6" fill="#e94560" opacity="0.8"/>
  <circle cx="382" cy="320" r="6" fill="#533483" opacity="0.8"/>
  <circle cx="380" cy="160" r="6" fill="#e94560" opacity="0.5"/>
  <circle cx="132" cy="320" r="6" fill="#533483" opacity="0.5"/>
  <!-- "ALPHA" text -->
  <text x="256" y="440" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="700" letter-spacing="12" fill="#e8e8e8" opacity="0.9">ALPHA</text>
</svg>
