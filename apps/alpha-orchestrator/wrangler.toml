name = "alpha-orchestrator"
main = "src/index.ts"
compatibility_date = "2024-04-15"
compatibility_flags = ["nodejs_compat"]

# Durable Object binding
[[durable_objects.bindings]]
name = "ORCHESTRATION_BRAIN"
class_name = "OrchestrationBrain"

# DO migrations
[[migrations]]
tag = "v1"
new_classes = ["OrchestrationBrain"]

# KV for metrics
[[kv_namespaces]]
binding = "METRICS"
id = "bridge-metrics-kv-id"

# D1 Database for bridge-specific data
[[d1_databases]]
binding = "BRIDGE_DB"
database_name = "aether-bridge-db"
database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# Queue for async actions
[[queues.bindings]]
name = "ACTIONS"
queue = "bridge-actions"

# Cron triggers
[triggers]
crons = ["*/15 * * * *", "0 * * * *"]

# Environment
[vars]
ENVIRONMENT = "development"
CREW_SIZE = "11"
BRIDGE_VERSION = "0.1"

# Observability
[observability]
enabled = true

# Dev settings
[dev]
port = 8788
local_protocol = "http"
