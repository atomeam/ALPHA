#:schema node_modules/wrangler/config-schema.json

name = "self-adaptive-app"
main = "dist/worker.js"
compatibility_date = "2026-04-21"
compatibility_flags = ["nodejs_compat"]
usage_model = "standard"

workers_dev = true

[observability]
enabled = true
# Logpush can be enabled via:
# wrangler logpush enable --environment production

# ── Production Bindings ──────────────────────────────

[[kv_namespaces]]
binding = "METRICS"
id = "f3171ead95434d0a9be7a3a2526700b8"

[[queues.producers]]
queue = "adaptive-actions"
binding = "ACTIONS"

[[queues.consumers]]
queue = "adaptive-actions"
max_batch_size = 10
max_batch_timeout = 30

[[durable_objects.bindings]]
name = "ASSESSMENT_BRAIN"
class_name = "AssessmentBrain"
script_name = "self-adaptive-app"

# ── Preview Environment ──────────────────────────────

[env.preview]
