name = "self-adaptive-app"
main = "src/index.ts"
compatibility_date = "2026-05-23"

[[durable_objects.bindings]]
name = "ASSESSMENT_ENGINE"
class_name = "AssessmentEngine"

[[migrations]]
tag = "v1"
new_classes = ["AssessmentEngine"]

[[kv_namespaces]]
binding = "ADAPTIVE_STATE"
id = "REPLACE_WITH_KV_ID"

[[queues.producers]]
binding = "ADAPTIVE_QUEUE"
queue = "adaptive-queue"

[[queues.consumers]]
queue = "adaptive-queue"
max_batch_size = 10
max_batch_timeout = 5