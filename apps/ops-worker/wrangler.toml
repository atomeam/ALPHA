name = "ops-worker"
main = "src/index.ts"
compatibility_date = "2024-04-15"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
[[d1_databases]]
binding = "BRIDGE_DB"
database_name = "aether-bridge-db"
# database_id provided via wrangler secret or environment

# Environment variables
[vars]
SLACK_OPS_RUNS_CHANNEL_ID = "C.opsruns"  # Replace with actual channel ID

# Dev settings
[dev]
port = 8789
local_protocol = "http"

# Secrets (set via: npx wrangler secret put <name>)
# SLACK_BOT_TOKEN
# SLACK_SIGNING_SECRET
# NOTION_TOKEN