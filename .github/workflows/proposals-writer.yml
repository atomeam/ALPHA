name: proposals-writer

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

concurrency:
  group: proposals-writer
  cancel-in-progress: false

jobs:
  write:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build monorepo
        run: npm run build --workspaces --if-present

      - name: Run ProposalsWatcher once
        run: node dist/proposals-watcher.js --once

      - name: Verify KV flip
        run: |
          echo "Checking KV..."
          curl -s https://aether.atomeam.workers.dev/api/proposals/snapshot | jq -r '.source'

