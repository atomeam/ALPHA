name: proposals-writer

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

concurrency:
  group: proposals-writer
  cancel-in-progress: false

jobs:
  write:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run ProposalsWatcher once
        run: npx tsx packages/chaos/src/proposals-watcher.ts --once
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_STATE_ID: ${{ secrets.CF_KV_STATE_ID }}
          CF_KV_STATE_CACHE_ID: ${{ secrets.CF_KV_STATE_CACHE_ID }}

      - name: Verify
        run: |
          echo "Checking KV..."
          curl -s https://aether.atomeam.workers.dev/api/proposals/snapshot | jq -r '.source'

