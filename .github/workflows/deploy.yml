name: deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  # Phase 1: Lint and test
  quality:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # Phase 2: Deploy to Cloudflare Workers (preview)
  deploy-preview:
    name: deploy-preview
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request'
    environment:
      name: preview
      url: https://alpha-preview.${{ vars.CLOUDFLARE_PAGES_SUBDOMAIN }}.workers.dev

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Workers (preview)
        working-directory: apps/backend
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          environment: preview
          command: deploy --env preview

      - name: Run smoke tests
        run: |
          sleep 5
          # Smoke tests against preview URL
          PR_NUMBER=${{ github.event.pull_request.number || 'preview' }}
          curl -f "https://alpha-preview-${PR_NUMBER}.${{ vars.CLOUDFLARE_PAGES_SUBDOMAIN }}.workers.dev/api/health" || exit 1
          curl -f "https://alpha-preview-${PR_NUMBER}.${{ vars.CLOUDFLARE_PAGES_SUBDOMAIN }}.workers.dev/api/metrics" || exit 1

  # Phase 3: Deploy to production
  deploy-production:
    name: deploy-production
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://alpha.atomeam.workers.dev

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Workers (production)
        working-directory: apps/backend
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production

      - name: Run smoke tests
        run: |
          sleep 5
          curl -f "https://alpha.atomeam.workers.dev/api/health" || exit 1
          curl -f "https://alpha.atomeam.workers.dev/api/metrics" || exit 1

      - name: Monitor error rate (rollback if needed)
        run: |
          ERROR_RATE=$(curl -s "https://alpha.atomeam.workers.dev/api/metrics" | jq -r '.error_budget_remaining // "80%"')
          if [ "$ERROR_RATE" = "0%" ]; then
            echo "Error budget exhausted. Triggering rollback..."
            # Revert to previous deployment
            wrangler deployments rollback --env production
            exit 1
          fi

  # Phase 4: Auto-merge self-improvement PRs
  auto-merge-improve:
    name: auto-merge-improve
    runs-on: ubuntu-latest
    needs: [deploy-preview, deploy-production]
    if: github.event_name == 'pull_request' && contains(github.head_ref, 'alpha-improve')
    environment:
      name: alpha-improve
    timeout-minutes: 30

    steps:
      - name: Check if all CI passed
        run: |
          gh pr checks "${{ github.event.pull_request.number }}" --repo ${{ github.repository }} --watch --interval 30 || true

      - name: Auto-merge if green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(gh pr view "${{ github.event.pull_request.number }}" --json statusCheckRollup --jq '.statusCheckRollup | length')
          FAILED=$(gh pr view "${{ github.event.pull_request.number }}" --json statusCheckRollup --jq '[.statusCheckRollup[] | select(.conclusion == "FAILURE" or .conclusion == "TIMED_OUT")] | length')
          
          if [ "$FAILED" -eq 0 ] && [ "$STATUS" -gt 0 ]; then
            gh pr merge "${{ github.event.pull_request.number }}" --squash --auto
          fi