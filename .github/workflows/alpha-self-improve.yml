name: alpha-self-improvement

on:
  workflow_dispatch:
    inputs:
      objective_file:
        description: 'Path to objectives file (default: alpha_objectives.md)'
        required: false
        default: 'alpha_objectives.md'
  schedule:
    # Every Monday at 9 AM UTC
    - cron: '0 9 * * 1'

env:
  REPO: atomeam/ALPHA
  OBJECTIVE_FILE: alpha_objectives.md

jobs:
  improve:
    name: Run self-improvement cycle
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate objective file
        run: |
          if [ ! -f "${{ github.event.inputs.objective_file || env.OBJECTIVE_FILE }}" ]; then
            echo "Error: Objective file not found: ${{ github.event.inputs.objective_file || env.OBJECTIVE_FILE }}"
            exit 1
          fi
          echo "Using objectives from: ${{ github.event.inputs.objective_file || env.OBJECTIVE_FILE }}"
          cat "${{ github.event.inputs.objective_file || env.OBJECTIVE_FILE }}"

      - name: Start OpenHands improvement cycle
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
        run: |
          python3 scripts/openhands_alpha.py start \
            --objective "${{ github.event.inputs.objective_file || env.OBJECTIVE_FILE }}" \
            --repo "${{ env.REPO }}" \
            --branch "main"

      - name: Post result comment
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Self-improvement cycle triggered. Check [OpenHands Cloud](https://app.all-hands.dev) for progress.'
            })

  # Phase 2: Auto-merge when criteria met
  auto-merge:
    needs: improve
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: alpha-improve
    timeout-minutes: 30

    steps:
      - name: Check PR status
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
        run: |
          # Wait for OpenHands to create PR (up to 10 minutes)
          for i in {1..20}; do
            PR_COUNT=$(gh pr list --repo ${{ env.REPO }} --state open --head "openhands/alpha-improve" --json number --jq 'length')
            if [ "$PR_COUNT" -gt 0 ]; then
              echo "Found PR(s): $PR_COUNT"
              break
            fi
            echo "Waiting for PR... attempt $i/20"
            sleep 30
          done

      - name: Check CI status
        run: |
          PR_NUMBER=$(gh pr list --repo ${{ env.REPO }} --state open --head "openhands/alpha-improve" --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found"
            exit 0
          fi
          echo "Checking PR #$PR_NUMBER CI status..."
          gh pr checks "$PR_NUMBER" --repo ${{ env.REPO }} --watch --interval 30 || true

      - name: Auto-merge if green
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --repo ${{ env.REPO }} --state open --head "openhands/alpha-improve" --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR to merge"
            exit 0
          fi
          
          # Check if all checks passed
          STATUS=$(gh pr view "$PR_NUMBER" --repo ${{ env.REPO }} --json statusCheckRollup --jq '.statusCheckRollup | length')
          FAILED=$(gh pr view "$PR_NUMBER" --repo ${{ env.REPO }} --json statusCheckRollup --jq '[.statusCheckRollup[] | select(.conclusion == "FAILURE" or .conclusion == "TIMED_OUT")] | length')
          
          echo "Total checks: $STATUS, Failed: $FAILED"
          
          if [ "$FAILED" -eq 0 ] && [ "$STATUS" -gt 0 ]; then
            echo "All checks passed. Merging PR..."
            gh pr merge "$PR_NUMBER" --repo ${{ env.REPO }} --squash --auto
          else
            echo "Checks not ready or failed. Manual review required."
            gh pr edit "$PR_NUMBER" --repo ${{ env.REPO }} --add-label "needs-review"
          fi