name = "aether-bridge"
main = "apps/bridge/src/worker.ts"
compatibility_date = "2026-05-19"
node_compat = true

[observability]
enabled = true

# D1 Database bindings
[[d1_databases]]
binding = "GovernanceDB"
database_name = "aether-governance"
database_id = "aether-governance-id-placeholder"

# KV Namespaces
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "rate-limit-ns-placeholder"

# Environment-specific config
[env.production]
name = "aether-bridge-prod"

[[d1_databases]]
binding = "GovernanceDB"
database_name = "aether-governance"
database_id = "aether-governance-prod-id-placeholder"