name = "aether-bridge"
main = "apps/bridge/src/worker.ts"
compatibility_date = "2026-05-19"
node_compat = true

[observability]
enabled = true

# D1 Database bindings
[[d1_databases]]
binding = "GovernanceDB"
database_name = "council-routing-db"
database_id = "218e0bc6-f955-45d1-b9bf-276d384917c7"

# KV Namespaces
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "7319ee9195df4ccf8f4b2c8449dd7930"

# Production environment
[env.production]
name = "aether-bridge-prod"

[[d1_databases]]
binding = "GovernanceDB"
database_name = "council-routing-db"
database_id = "218e0bc6-f955-45d1-b9bf-276d384917c7"