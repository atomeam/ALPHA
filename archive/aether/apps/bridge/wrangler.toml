name = "aether-bridge"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

[[kv_namespaces]]
binding = "STATE"
id = "7319ee9195df4ccf8f4b2c8449dd7930"

[[kv_namespaces]]
binding = "STATE_CACHE"
id = "d22e703c3af9451a9942fa2a551a1aa8"

[[d1_databases]]
binding = "DB"
database_name = "council-routing-db"
database_id = "218e0bc6-f955-45d1-b9bf-276d384917c7"

[[queues.producers]]
binding = "CURATOR_QUEUE"
queue = "curator-jobs"

[[queues.consumers]]
queue = "curator-jobs"
max_batch_size = 1
max_retries = 3

[browser]
binding = "MYBROWSER"

[[r2_buckets]]
binding = "_LOGS"
bucket_name = "aether-logs"
