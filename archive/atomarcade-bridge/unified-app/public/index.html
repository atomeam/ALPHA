<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>atomeam Stack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid #30363d; margin-bottom: 30px; }
    h1 { font-size: 24px; color: #58a6ff; }
    .timestamp { color: #8b949e; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
    .card h2 { font-size: 16px; color: #8b949e; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
    .stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #21262d; }
    .stat:last-child { border-bottom: none; }
    .stat-name { color: #c9d1d9; }
    .stat-value { color: #58a6ff; font-weight: 600; }
    .status-active { color: #3fb950; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>atomeam Stack</h1>
      <span class="timestamp" id="timestamp"></span>
    </header>
    <div class="grid">
      <div class="card">
        <h2>Status</h2>
        <div id="status">Loading...</div>
      </div>
      <div class="card">
        <h2>Repos</h2>
        <div id="repos">Loading...</div>
      </div>
      <div class="card">
        <h2>Tools</h2>
        <div id="tools">Loading...</div>
      </div>
    </div>
  </div>
  <script>
    async function loadData() {
      const status = await fetch('/api/status').then(r => r.json());
      document.getElementById('timestamp').textContent = new Date(status.timestamp).toLocaleString();
      document.getElementById('status').innerHTML = `
        <div class="stat"><span class="stat-name">Repos</span><span class="stat-value">${status.summary.totalRepos}</span></div>
        <div class="stat"><span class="stat-name">Logs</span><span class="stat-value">${status.summary.totalLogs}</span></div>
        <div class="stat"><span class="stat-name">Tools</span><span class="stat-value">${status.summary.totalTools}</span></div>
      `;
      const repos = await fetch('/api/repos').then(r => r.json());
      document.getElementById('repos').innerHTML = repos.map(r => `
        <div class="stat"><span class="stat-name">${r.name}</span><span class="stat-value status-active">${r.exists ? '✓' : '✗'}</span></div>
      `).join('');
      const tools = await fetch('/api/tools').then(r => r.json());
      document.getElementById('tools').innerHTML = tools.map(t => `
        <div class="stat"><span class="stat-name">${t.name}</span><span class="stat-value">${t.cmd}</span></div>
      `).join('');
    }
    loadData();
    setInterval(loadData, 10000);
  </script>
</body>
</html>
